name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      # Pinned from actions/checkout v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # Pinned from actions/setup-go v5.
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/tracker ./cmd/tracker
          archive="tracker_${version}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "dist/${archive}" -C dist tracker
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
      # Pinned from actions/upload-artifact v4.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      # Pinned from actions/checkout v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # Pinned from actions/download-artifact v4.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - name: Build checksums file
        run: |
          set -eu
          cat dist/*.sha256 > dist/checksums.txt
      - name: Attest release archives
        # Pinned from actions/attest-build-provenance v2.
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
      - name: Publish release assets
        # Pinned from softprops/action-gh-release v2.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            scripts/install.sh
