name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Pinned from actions/checkout v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Print base markers
        run: |
          test -f docs/v1.5-base-marker.txt && cat docs/v1.5-base-marker.txt || true
          test -f docs/v1.6-base-marker.txt && cat docs/v1.6-base-marker.txt || true
      # Pinned from actions/setup-go v5.
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - name: Run vet
        run: go vet ./...
      - name: Check install script syntax
        run: |
          sh -n scripts/install.sh
          sh -n scripts/verify-release.sh
      - name: Run tests
        run: go test ./...

  stability:
    runs-on: ubuntu-latest
    steps:
      # Pinned from actions/checkout v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Print base markers
        run: |
          test -f docs/v1.5-base-marker.txt && cat docs/v1.5-base-marker.txt || true
          test -f docs/v1.6-base-marker.txt && cat docs/v1.6-base-marker.txt || true
      # Pinned from actions/setup-go v5.
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - name: Run stabilization smoke lane
        run: sh scripts/stability-smoke.sh
