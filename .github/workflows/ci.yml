name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Print v1.5 base marker
        run: |
          test -f docs/v1.5-base-marker.txt && cat docs/v1.5-base-marker.txt || true
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run vet
        run: go vet ./...
      - name: Check install script syntax
        run: |
          sh -n scripts/install.sh
          sh -n scripts/verify-release.sh
      - name: Run tests
        run: go test ./...

  stability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print v1.5 base marker
        run: |
          test -f docs/v1.5-base-marker.txt && cat docs/v1.5-base-marker.txt || true
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run stabilization smoke lane
        run: sh scripts/stability-smoke.sh
